<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will Simpson</title>
<link rel="icon" type="image/x-icon" href="tyler.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background-color: white;
    font-family: 'Inter', sans-serif;
    color: #333;
    font-size: 1.2rem;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow: hidden;
}

.container { text-align: left; }

/* Name row */
.name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 60px;
    margin-left: calc(-2.9rem - 8px);
}

.name-row img {
    width: 2rem;
    height: 2rem;
    cursor: pointer;
    transition: transform 0.45s cubic-bezier(0.34, 1.6, 0.64, 1);
}

.name-row img.returning {
    transition: transform 0.55s cubic-bezier(0.34, 1.7, 0.64, 1);
}

.name-row img.jogging {
    transition: none;
    animation: jog 1.8s forwards;
}

@keyframes jog {
    0% { transform: translate(0,0); }
    100% { transform: translate(-900px,0) scaleX(-1); }
}

.name { font-size: 1.45rem; }
.asterisk { color: #aaa; font-weight: 600; }

a { color: #333; text-decoration: none; }
.underline { text-decoration: underline; }

/* Links */
.link-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}

.link-icon {
    width: 1.05rem;
    height: 1.05rem;
}

.link-icon img {
    width: 100%;
    height: 100%;
}

/* EMAIL SYSTEM */
.email-link-wrap {
    position: relative;
    display: inline-block;
}

/* Crossfade stack */
.email-link {
    display: inline-grid;
    grid-template-areas: "stack";
    text-decoration: underline;
}

.email-label {
    grid-area: stack;
    transition: opacity 0.2s ease, transform 0.2s ease;
}

/* default state */
.label-default {
    opacity: 1;
    transform: translateY(0);
}

/* copied state */
.label-copied {
    opacity: 0;
    transform: translateY(2px);
}

/* active */
.email-link.active .label-default {
    opacity: 0;
    transform: translateY(-2px);
}

.email-link.active .label-copied {
    opacity: 1;
    transform: translateY(0);
}

/* floating email */
.email-address {
    position: absolute;
    left: calc(100% + 10px);
    top: 50%;
    transform: translateY(-50%);
    font-size: 1rem;
    color: #888;
    white-space: nowrap;
    pointer-events: none;
    clip-path: inset(0 100% 0 0);
}

.email-address.reveal {
    animation: reveal 0.6s forwards;
}

.email-address.conceal {
    animation: conceal 0.4s forwards;
}

@keyframes reveal {
    to { clip-path: inset(0 0 0 0); }
}

@keyframes conceal {
    to { clip-path: inset(0 100% 0 0); }
}
</style>
</head>

<body>

<div class="container">
    <div class="name-row">
        <img src="https://wills.im/pson/msn.webp" id="msn-icon">
        <span class="name"><span class="asterisk">*</span>Will Simpson</span>
    </div>

    <div class="link-row">
        my
        <span class="link-icon"><img src="linkedin.svg"></span>
        <a href="https://www.linkedin.com/in/will-0046a33bb" target="_blank" class="underline">LinkedIn</a>
    </div>

    <div class="link-row">
        my
        <span class="link-icon"><img src="gmail.svg"></span>
        <span class="email-link-wrap">
            <a href="#" class="email-link" id="email-link">
                <span class="email-label label-default">Email</span>
                <span class="email-label label-copied">copied 👍</span>
            </a>
            <span class="email-address" id="email-address">
                2006.willsimpson@gmail.com
            </span>
        </span>
    </div>
</div>

<script>
/* EMAIL */
const link = document.getElementById('email-link');
const address = document.getElementById('email-address');

let busy = false;

link.addEventListener('click', (e) => {
    e.preventDefault();
    if (busy) return;
    busy = true;

    navigator.clipboard.writeText('2006.willsimpson@gmail.com');

    // fade to copied
    link.classList.add('active');

    // show email
    address.classList.remove('conceal');
    address.classList.add('reveal');

    // hide email
    setTimeout(() => {
        address.classList.remove('reveal');
        address.classList.add('conceal');
    }, 2800);

    // fade back AFTER delay
    setTimeout(() => {
        setTimeout(() => {
            link.classList.remove('active');
            busy = false;
        }, 1000); // clean pause before fading back
    }, 3200);
});
</script>

</body>
</html>
