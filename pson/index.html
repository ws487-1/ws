<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Simpson</title>
    <link rel="icon" type="image/x-icon" href="tyler.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');
        body {
            margin: 0;
            height: 100vh;
            background-color: white;
            font-family: 'Inter', sans-serif;
            color: #333333;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .container {
            text-align: left;
        }
        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 60px;
            margin-left: calc(-2.9rem - 8px);
        }
        .name-row img {
            width: 2rem;
            height: 2rem;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.34, 1.6, 0.64, 1);
        }
        .name-row img.returning {
            transition: transform 0.55s cubic-bezier(0.34, 1.7, 0.64, 1);
        }
        .name {
            font-size: 1.45rem;
        }
        .asterisk {
            color: #aaaaaa;
            font-weight: 600;
        }
        a {
            color: #333333;
            text-decoration: none;
        }
        .underline {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name-row">
            <img src="https://wills.im/pson/msn.webp" alt="MSN icon" id="msn-icon">
            <span class="name"><span class="asterisk">*</span>Will Simpson</span>
        </div>
        <div>my <a href="https://www.linkedin.com/in/will-0046a33bb" target="_blank" class="underline">LinkedIn</a></div>
        <div>my <a href="mailto:2006.willsimpson@gmail.com" class="underline">Email</a></div>
    </div>

    <script>
        const icon = document.getElementById('msn-icon');
        let isAvoiding = false;
        let returnTimeout;

        const dodgeOptions = [
            { x:  90, y: -70, r:  25 },
            { x: -90, y: -70, r: -25 },
            { x:  80, y:  80, r: -20 },
            { x: -80, y:  80, r:  20 },
            { x: 110, y: -20, r:  30 },
            { x:-110, y: -20, r: -30 },
            { x:  60, y:-100, r:  15 },
            { x: -60, y:-100, r: -15 },
        ];

        icon.addEventListener('mouseenter', () => {
            if (isAvoiding) return;
            isAvoiding = true;

            const dodge = dodgeOptions[Math.floor(Math.random() * dodgeOptions.length)];

            icon.classList.remove('returning');
            icon.style.transform = `translate(${dodge.x}px, ${dodge.y}px) rotate(${dodge.r}deg)`;

            clearTimeout(returnTimeout);
            returnTimeout = setTimeout(() => {
                icon.classList.add('returning');
                icon.style.transform = 'translate(0px, 0px) rotate(0deg)';
                setTimeout(() => {
                    isAvoiding = false;
                    icon.classList.remove('returning');
                }, 600);
            }, 750);
        });
    </script>
</body>
</html>
