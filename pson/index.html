<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Simpson</title>
    <link rel="icon" type="image/x-icon" href="tyler.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');
        body {
            margin: 0;
            height: 100vh;
            background-color: white;
            font-family: 'Inter', sans-serif;
            color: #333333;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .container {
            text-align: left;
        }
        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 60px;
            margin-left: calc(-2.9rem - 8px);
        }
        .name-row img {
            width: 2rem;
            height: 2rem;
            object-fit: contain;
            transition: transform 0.1s linear;
        }
        .name-row img.spinning {
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .name {
            font-size: 1.45rem;
        }
        .asterisk {
            color: #aaaaaa;
            font-weight: 600;
        }
        a {
            color: #333333;
            text-decoration: none;
        }
        .underline {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name-row">
            <img src="https://wills.im/pson/msn.webp" alt="MSN icon" id="msn-icon">
            <span class="name"><span class="asterisk">*</span>Will Simpson</span>
        </div>
        <div>my <a href="https://www.linkedin.com/in/will-0046a33bb" target="_blank" class="underline">LinkedIn</a></div>
        <div>my <a href="mailto:2006.willsimpson@gmail.com" class="underline">Email</a></div>
    </div>
    <script>
        const icon = document.getElementById('msn-icon');
        icon.addEventListener('mouseenter', () => icon.classList.add('spinning'));
        icon.addEventListener('mouseleave', () => icon.classList.remove('spinning'));
    </script>
</body>
</html>
