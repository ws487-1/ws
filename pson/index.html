<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will Simpson</title>
    <link rel="icon" type="image/x-icon" href="tyler.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap');
        body {
            margin: 0;
            height: 100vh;
            background-color: white;
            font-family: 'Inter', sans-serif;
            color: #333333;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }
        .container {
            text-align: left;
        }
        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 60px;
            margin-left: calc(-2.9rem - 8px);
        }
        .name-row img {
            width: 2rem;
            height: 2rem;
            object-fit: contain;
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.34, 1.6, 0.64, 1);
        }
        .name-row img.returning {
            transition: transform 0.55s cubic-bezier(0.34, 1.7, 0.64, 1);
        }
        .name-row img.jogging {
            transition: none;
            animation: jog 1.8s cubic-bezier(0.4, 0, 0.6, 1) forwards;
        }
        @keyframes jog {
            0%   { transform: translate(0px, 0px)     rotate(0deg)  scaleX(1); }
            3%   { transform: translate(-10px, 0px)   rotate(-8deg) scaleX(-1); }
            6%   { transform: translate(-30px, -8px)  rotate(5deg)  scaleX(-1); }
            12%  { transform: translate(-60px, 0px)   rotate(-8deg) scaleX(-1); }
            18%  { transform: translate(-95px, -9px)  rotate(5deg)  scaleX(-1); }
            24%  { transform: translate(-130px, 0px)  rotate(-8deg) scaleX(-1); }
            30%  { transform: translate(-165px, -9px) rotate(5deg)  scaleX(-1); }
            36%  { transform: translate(-205px, 0px)  rotate(-8deg) scaleX(-1); }
            42%  { transform: translate(-245px, -9px) rotate(5deg)  scaleX(-1); }
            48%  { transform: translate(-285px, 0px)  rotate(-8deg) scaleX(-1); }
            54%  { transform: translate(-325px, -9px) rotate(5deg)  scaleX(-1); }
            60%  { transform: translate(-375px, 0px)  rotate(-8deg) scaleX(-1); }
            66%  { transform: translate(-430px, -9px) rotate(5deg)  scaleX(-1); }
            72%  { transform: translate(-490px, 0px)  rotate(-8deg) scaleX(-1); }
            78%  { transform: translate(-560px, -9px) rotate(5deg)  scaleX(-1); }
            84%  { transform: translate(-640px, 0px)  rotate(-8deg) scaleX(-1); }
            90%  { transform: translate(-730px, -9px) rotate(5deg)  scaleX(-1); }
            100% { transform: translate(-900px, 0px)  rotate(-8deg) scaleX(-1); }
        }
        .name {
            font-size: 1.45rem;
        }
        .asterisk {
            color: #aaaaaa;
            font-weight: 600;
        }
        a {
            color: #333333;
            text-decoration: none;
        }
        .underline {
            text-decoration: underline;
        }

        /* Link rows */
        .link-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            white-space: nowrap;
        }
        .link-icon {
            width: 1.05rem;
            height: 1.05rem;
            display: inline-flex;
            align-items: center;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.7, 0.64, 1);
        }
        .link-icon:hover {
            transform: scale(1.25) rotate(-8deg);
        }

        /* Email toast area */
        .email-reveal-wrap {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            max-width: 0;
            opacity: 0;
            vertical-align: middle;
        }
        .email-reveal-wrap.show {
            animation: revealEmail 0.5s cubic-bezier(0.34, 1.5, 0.64, 1) 0.1s forwards;
        }
        .email-reveal-wrap.hide {
            animation: hideEmail 0.35s ease-in forwards;
        }
        @keyframes revealEmail {
            0%   { max-width: 0;     opacity: 0; transform: translateX(-8px); }
            100% { max-width: 260px; opacity: 1; transform: translateX(0); }
        }
        @keyframes hideEmail {
            0%   { max-width: 260px; opacity: 1; transform: translateX(0); }
            100% { max-width: 0;     opacity: 0; transform: translateX(-8px); }
        }
        .email-text {
            font-size: 1rem;
            color: #888;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        /* Copied toast */
        .copied-toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 0.95rem;
            white-space: nowrap;
            pointer-events: none;
            z-index: 99;
        }
        .copied-toast.pop-in {
            animation: toastIn 0.45s cubic-bezier(0.34, 1.7, 0.64, 1) forwards,
                       toastOut 0.35s ease-in 2.2s forwards;
        }
        @keyframes toastIn {
            0%   { bottom: -60px; opacity: 0; transform: translateX(-50%) scale(0.8) rotate(-3deg); }
            60%  { bottom: 32px;  opacity: 1; transform: translateX(-50%) scale(1.06) rotate(1deg); }
            100% { bottom: 28px;  opacity: 1; transform: translateX(-50%) scale(1) rotate(0deg); }
        }
        @keyframes toastOut {
            0%   { bottom: 28px; opacity: 1; transform: translateX(-50%) scale(1); }
            100% { bottom: -60px; opacity: 0; transform: translateX(-50%) scale(0.85); }
        }

        /* Email link wiggle on click */
        @keyframes linkWiggle {
            0%   { transform: rotate(0deg); }
            20%  { transform: rotate(-6deg) scale(1.1); }
            40%  { transform: rotate(5deg)  scale(1.1); }
            60%  { transform: rotate(-4deg); }
            80%  { transform: rotate(3deg); }
            100% { transform: rotate(0deg); }
        }
        .wiggle {
            display: inline-block;
            animation: linkWiggle 0.45s cubic-bezier(0.34, 1.5, 0.64, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="name-row">
            <img src="https://wills.im/pson/msn.webp" alt="MSN icon" id="msn-icon">
            <span class="name"><span class="asterisk">*</span>Will Simpson</span>
        </div>

        <div class="link-row">
            my
            <span class="link-icon">
                <!-- LinkedIn icon -->
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <rect width="24" height="24" rx="4" fill="#0A66C2"/>

                </svg>
            </span>
            <a href="https://www.linkedin.com/in/will-0046a33bb" target="_blank" class="underline">LinkedIn</a>

        <div class="link-row">
            my
            <span class="link-icon">
                <!-- Gmail icon -->
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                    <path d="M2 6.5C2 5.672 2.672 5 3.5 5H20.5C21.328 5 22 5.672 22 6.5V17.5C22 18.328 21.328 19 20.5 19H3.5C2.672 19 2 18.328 2 17.5V6.5Z" fill="white" stroke="#ddd" stroke-width="0.5"/>
                    <path d="M2 6.5L12 13.5L22 6.5" stroke="none" fill="none"/>
                    <path d="M2 5.5L12 12.5L22 5.5V6.5L12 13.5L2 6.5V5.5Z" fill="#EA4335"/>
                    <path d="M2 5.5H3.5L12 11L20.5 5.5H22L12 12.5L2 5.5Z" fill="#EA4335"/>
                    <rect x="2" y="5" width="20" height="14" rx="1.5" fill="none" stroke="#ddd" stroke-width="0.5"/>
                    <path d="M2 6L12 12.5L22 6V7L12 13.5L2 7V6Z" fill="#EA4335"/>
                    <path d="M3.5 5H20.5C21.328 5 22 5.672 22 6.5L12 13L2 6.5C2 5.672 2.672 5 3.5 5Z" fill="#EA4335"/>
                    <path d="M2 6.5V17.5C2 18.328 2.672 19 3.5 19H20.5C21.328 19 22 18.328 22 17.5V6.5L12 13.5L2 6.5Z" fill="#fff"/>
                    <path d="M3.5 5H20.5C21.328 5 22 5.672 22 6.5L12 13.5L2 6.5C2 5.672 2.672 5 3.5 5Z" fill="#EA4335"/>
                    <path d="M2 6.5L12 13.5L22 6.5" stroke="#C5221F" stroke-width="0.3" fill="none"/>
                </svg>
            </span>
            <a href="#" class="underline" id="email-link">Email</a>
            <span class="email-reveal-wrap" id="email-reveal">
                <span class="email-text">2006.willsimpson@gmail.com</span>
            </span>
        </div>
    </div>

    <div class="copied-toast" id="copied-toast">it's in your clipboard 👍</div>

    <script>
        // MSN icon dodge logic
        const icon = document.getElementById('msn-icon');
        let isAvoiding = false;
        let returnTimeout;
        let triggerCount = 0;
        let hasLegged = false;

        const dodgeOptions = [
            { x:  90, y: -70, r:  25 },
            { x: -90, y: -70, r: -25 },
            { x:  80, y:  80, r: -20 },
            { x: -80, y:  80, r:  20 },
            { x: 110, y: -20, r:  30 },
            { x:-110, y: -20, r: -30 },
            { x:  60, y:-100, r:  15 },
            { x: -60, y:-100, r: -15 },
        ];

        icon.addEventListener('mouseenter', () => {
            if (isAvoiding || hasLegged) return;
            triggerCount++;

            if (triggerCount === 5) {
                hasLegged = true;
                clearTimeout(returnTimeout);
                icon.classList.remove('returning');
                icon.style.transform = '';
                void icon.offsetWidth;
                icon.classList.add('jogging');
                icon.addEventListener('animationend', () => {
                    icon.style.visibility = 'hidden';
                }, { once: true });
                return;
            }

            isAvoiding = true;
            const dodge = dodgeOptions[Math.floor(Math.random() * dodgeOptions.length)];
            icon.classList.remove('returning');
            icon.style.transform = `translate(${dodge.x}px, ${dodge.y}px) rotate(${dodge.r}deg)`;

            clearTimeout(returnTimeout);
            returnTimeout = setTimeout(() => {
                icon.classList.add('returning');
                icon.style.transform = 'translate(0px, 0px) rotate(0deg)';
                setTimeout(() => {
                    isAvoiding = false;
                    icon.classList.remove('returning');
                }, 600);
            }, 750);
        });

        // Email click logic
        const emailLink   = document.getElementById('email-link');
        const emailReveal = document.getElementById('email-reveal');
        const toast       = document.getElementById('copied-toast');
        let emailToastTimeout;
        let emailHideTimeout;
        let toastBusy = false;

        emailLink.addEventListener('click', (e) => {
            e.preventDefault();

            // Wiggle the link
            emailLink.classList.remove('wiggle');
            void emailLink.offsetWidth;
            emailLink.classList.add('wiggle');

            // Copy to clipboard
            navigator.clipboard.writeText('2006.willsimpson@gmail.com').catch(() => {});

            // Show email address
            emailReveal.classList.remove('hide');
            emailReveal.classList.add('show');

            // Hide after a moment
            clearTimeout(emailHideTimeout);
            emailHideTimeout = setTimeout(() => {
                emailReveal.classList.remove('show');
                emailReveal.classList.add('hide');
                emailReveal.addEventListener('animationend', () => {
                    emailReveal.classList.remove('hide');
                }, { once: true });
            }, 3000);

            // Toast
            toast.classList.remove('pop-in');
            void toast.offsetWidth;
            toast.classList.add('pop-in');
        });
    </script>
</body>
</html>
